<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ブルーアーカイブ ティア表メーカー</title>
    <link rel="stylesheet" href="styles.css?v=20260619-2" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>ブルーアーカイブ ティア表メーカー</h1>
        <p class="rights-note">画像はBlue Archive Wiki / TierMakerテンプレートからネット直読みします。個人利用向けです。</p>
      </div>
      <div class="status-panel" aria-live="polite">
        <span id="loadStatus">起動中...</span>
        <span id="characterCount">0件</span>
      </div>
    </header>

    <main class="app-shell">
      <section class="toolbar" aria-label="操作">
        <div class="toolbar-fields">
          <label class="search-box">
            <span>検索</span>
            <input id="searchInput" type="search" autocomplete="off" placeholder="キャラ名で絞り込み" />
          </label>

          <label class="sort-box">
            <span>並び替え</span>
            <span class="sort-controls">
              <select id="sortModeSelect">
                <option value="title">名前順</option>
                <option value="school">学園順</option>
                <option value="age">年齢順</option>
                <option value="height">身長順</option>
              </select>
              <button id="sortDirectionButton" class="icon-button sort-direction-button" type="button" aria-label="降順に切り替え" title="降順に切り替え">⇅</button>
            </span>
          </label>
        </div>

        <div class="button-group">
          <button id="addTierButton" type="button">＋ランク</button>
          <button id="addCharacterButton" type="button">＋キャラ</button>
          <button id="refreshButton" type="button">再取得</button>
          <button id="exportPngButton" type="button">PNG</button>
          <button id="exportJsonButton" type="button">JSON保存</button>
          <button id="importJsonButton" type="button">JSON読込</button>
          <button id="resetButton" type="button" class="danger">初期化</button>
          <input id="importFileInput" type="file" accept="application/json,.json" hidden />
        </div>
      </section>

      <section id="tierBoard" class="tier-board" aria-label="ティア表">
        <div id="tierRows" class="tier-rows"></div>
      </section>
    </main>

    <dialog id="addTierDialog" class="app-dialog">
      <form id="addTierForm" method="dialog">
        <h2>ランク追加</h2>
        <label>
          <span>ランク名</span>
          <input id="newTierLabel" type="text" maxlength="24" required />
        </label>
        <label>
          <span>色</span>
          <input id="newTierColor" type="hidden" value="#49b9bd" />
          <div id="newTierPalette" class="color-palette" aria-label="ランク色"></div>
        </label>
        <div class="dialog-actions">
          <button id="cancelTierButton" type="button">キャンセル</button>
          <button type="submit">追加</button>
        </div>
      </form>
    </dialog>

    <dialog id="addCharacterDialog" class="app-dialog">
      <form id="addCharacterForm" method="dialog">
        <h2>キャラ追加</h2>
        <label>
          <span>キャラ名</span>
          <input id="newCharacterTitle" type="text" maxlength="80" required />
        </label>
        <label>
          <span>画像URL</span>
          <input id="newCharacterImageUrl" type="url" placeholder="https://..." required />
        </label>
        <label>
          <span>参照URL</span>
          <input id="newCharacterSourceUrl" type="url" placeholder="https://..." />
        </label>
        <div class="dialog-actions">
          <button id="cancelCharacterButton" type="button">キャンセル</button>
          <button type="submit">追加</button>
        </div>
      </form>
    </dialog>

    <template id="tierRowTemplate">
      <article class="tier-row">
        <div class="tier-label-cell">
          <span class="tier-label-text" contenteditable="true" spellcheck="false"></span>
          <button class="tier-color-button" type="button" aria-label="行ラベル色"></button>
        </div>
        <div class="tier-items"></div>
      </article>
    </template>

    <div id="tierColorMenu" class="color-menu" hidden></div>

    <template id="characterTemplate">
      <div class="character-card" tabindex="0">
        <div class="character-image-frame">
          <img alt="" loading="lazy" decoding="async" crossorigin="anonymous" referrerpolicy="no-referrer" />
        </div>
        <span class="character-name"></span>
      </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.11/dist/html-to-image.min.js"></script>
    <script src="app.js?v=20260619-2"></script>
  </body>
</html>
